title: Codatus
url: https://codatus.com

# Posts live in _posts/ and render at /blog/<slug>/. The blog index
# (blog/index.html) iterates site.posts to render the latest as a
# featured callout and the rest as plain rows.
permalink: /blog/:title/

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - scripts
