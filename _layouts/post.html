---
layout: content
---
<a class="blog-back-link" href="/blog/">
    <span class="arrow">←</span> All posts
</a>

<div class="blog-post-masthead">
    <h1>{{ page.title }}</h1>
    <div class="blog-post-date">{{ page.date | date: "%B %-d, %Y" }}</div>
</div>

<article class="blog-post-content">
{{ content }}

{% include subscribe-form.html variant="post" heading=page.subscribe_heading body=page.subscribe_body button=page.subscribe_button form_id=page.subscribe_form_id %}
</article>
